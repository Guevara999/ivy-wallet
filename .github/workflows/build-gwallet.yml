name: Build G Wallet

on:
  workflow_dispatch: # Gives you the manual button to build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Force Injection of G Wallet Settings
      run: |
        # Safely rewrite the app identity package on the fly
        sed -i 's/applicationId = "com.ivy.wallet"/applicationId = "com.gwallet.app"/' app/build.gradle.kts
        
        # Safely overwrite all name variables right before compiling
        sed -i 's/"Ivy Wallet"/"G Wallet"/g' app/build.gradle.kts
        sed -i 's/"Ivy Wallet Debug"/"G Wallet Debug"/g' app/build.gradle.kts

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build Android APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: G-Wallet-Installer
        path: app/build/outputs/apk/debug/app-debug.apk
        
