name: Build G Wallet Fast

on:
  workflow_dispatch: # Manual play button trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Strip Google Analytics & Fix App Names
      run: |
        # 1. Strip the conflicting Google services & Firebase crash reporting plugins from the app configuration
        sed -i 's/id("com.google.gms.google-services")/\/\/ removed/g' app/build.gradle.kts
        sed -i 's/id("com.google.firebase.crashlytics")/\/\/ removed/g' app/build.gradle.kts
        sed -i 's/implementation(libs.bundles.firebase)/\/\/ removed/g' app/build.gradle.kts
        
        # 2. Safely apply your custom package ID identification line
        sed -i 's/applicationId = "com.ivy.wallet"/applicationId = "com.gwallet.app"/' app/build.gradle.kts
        
        # 3. Swap the system variables dynamically to read your customized display layout name
        sed -i 's/"Ivy Wallet"/"G Wallet"/g' app/build.gradle.kts
        sed -i 's/"Ivy Wallet Debug"/"G Wallet Debug"/g' app/build.gradle.kts

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build Android APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: G-Wallet-Package
        path: app/build/outputs/apk/debug/app-debug.apk
